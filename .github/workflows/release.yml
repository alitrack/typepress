name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-binaries:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: typepress-linux-x86_64
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: typepress-macos-arm64
          - os: macos-13
            target: x86_64-apple-darwin
            artifact: typepress-macos-x86_64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: typepress-windows-x86_64.exe

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Linux deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libfontconfig-dev

      - name: Build release
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package (Linux/macOS)
        if: runner.os != 'Windows'
        run: |
          cd target/${{ matrix.target }}/release
          tar -czf ../../../${{ matrix.artifact }}.tar.gz typepress

      - name: Package (Windows)
        if: runner.os == 'Windows'
        run: |
          cd target/${{ matrix.target }}/release
          7z a -tzip ../../../${{ matrix.artifact }}.zip typepress.exe

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}.*

  github-release:
    name: Create GitHub Release
    needs: build-binaries
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Flatten artifacts
        run: |
          find artifacts -type f -exec mv {} . \;
          ls -la

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            typepress-linux-x86_64.tar.gz
            typepress-macos-arm64.tar.gz
            typepress-macos-x86_64.tar.gz
            typepress-windows-x86_64.zip
          generate_release_notes: true
