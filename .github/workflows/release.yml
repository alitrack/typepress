name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-binaries:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: typepress-linux-x86_64
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: typepress-macos-arm64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: typepress-windows-x86_64

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Linux deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libfontconfig-dev

      - name: Build release
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package (Linux/macOS)
        if: runner.os != 'Windows'
        run: |
          cd target/${{ matrix.target }}/release
          tar -czf ../../../${{ matrix.artifact }}.tar.gz typepress

      - name: Package (Windows)
        if: runner.os == 'Windows'
        run: |
          cd target/${{ matrix.target }}/release
          7z a -tzip ../../../${{ matrix.artifact }}.zip typepress.exe

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}.*

  github-release:
    name: Create GitHub Release
    needs: build-binaries
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Flatten artifacts
        run: |
          find artifacts -type f -exec mv {} . \;
          ls -la

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            typepress-linux-x86_64.tar.gz
            typepress-macos-arm64.tar.gz
            typepress-windows-x86_64.zip
          generate_release_notes: true

  publish-npm:
    name: Publish to npm
    needs: github-release
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/node
    steps:
      - uses: actions/checkout@v4

      - name: Check if version already published
        id: check
        working-directory: .
        run: |
          VER=$(node -p "require('./packages/node/package.json').version")
          PUB=$(npm view typepress-pdf version 2>/dev/null || echo "0.0.0")
          echo "local=$VER published=$PUB"
          if [ "$VER" = "$PUB" ]; then
            echo "published=true" >> $GITHUB_OUTPUT
          else
            echo "published=false" >> $GITHUB_OUTPUT
          fi

      - uses: actions/setup-node@v4
        if: steps.check.outputs.published == 'false'
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - name: Publish
        if: steps.check.outputs.published == 'false'
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  publish-pypi:
    name: Publish to PyPI
    needs: github-release
    runs-on: ubuntu-latest
    permissions:
      id-token: write  # required for PyPI OIDC
      contents: read
    defaults:
      run:
        working-directory: packages/python
    steps:
      - uses: actions/checkout@v4

      - name: Check if version already published
        id: check
        working-directory: .
        run: |
          VER=$(python3 -c "import tomllib; print(tomllib.load(open('packages/python/pyproject.toml','rb'))['project']['version'])")
          PUB=$(pip index versions typepress 2>/dev/null | head -1 | grep -oP '[\d.]+' || echo "0.0.0")
          echo "local=$VER published=$PUB"
          if [ "$VER" = "$PUB" ]; then
            echo "published=true" >> $GITHUB_OUTPUT
          else
            echo "published=false" >> $GITHUB_OUTPUT
          fi

      - name: Build
        if: steps.check.outputs.published == 'false'
        run: |
          pip install build
          python3 -m build

      - name: Publish
        if: steps.check.outputs.published == 'false'
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: packages/python/dist
          password: ${{ secrets.PYPI_TOKEN }}
