[package]
name = "fulgur"
version = "0.18.0"
edition = "2024"
license = "MIT OR Apache-2.0"
description = "Forked fulgur with blitz-html 0.3"
publish = false

[dependencies]
cssparser = "0.37"
krilla = "0.7.0"
krilla-svg = "0.7.0"
usvg = "0.45"
blitz-html = "0.3.0-alpha.6"
blitz-dom = { version = "0.3.0-alpha.6", features = ["floats"] }
blitz-traits = "0.3.0-alpha.6"
taffy = { version = "=0.11.0-experimental-cache-fix.3", features = ["float_layout"] }
parley = "0.10"
skrifa = "0.42"
woff2-patched = "0.4"
# stylo re-exported through blitz-dom; use same version as workspace
style = { package = "stylo", version = "0.18.0" }
thiserror = "2"
minijinja = { version = "=2.20.0", features = ["unstable_machinery"] }
serde_json = "1"
log = "0.4"
lopdf = "0.40.0"
unicode-segmentation = "1.13"
unicode-properties = "0.1"
image = { version = "0.25", default-features = false, features = ["png"] }
serde = { version = "1", features = ["derive"] }

[lib]
name = "fulgur"
path = "src/lib.rs"
